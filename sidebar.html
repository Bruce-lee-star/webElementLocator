<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Element Selector</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="sidebar-container">
    <div class="controls">
      <button id="toggleLocator" class="toggle-btn">
        <i data-lucide="mouse-pointer-click" class="btn-icon"></i>
        <span id="locatorBtnText">Start Pick</span>
      </button>
      <button id="openStandaloneBtn" class="standalone-btn" title="Open in Separate Window">
        <i data-lucide="external-link" class="btn-icon"></i>
      </button>
    </div>

    <div class="content-area">
      <div id="previewSection" class="preview-section">
        <div class="preview-header">
          <h4>
            <i data-lucide="crosshair" class="section-icon"></i>
            Current Preview
          </h4>
          <span class="preview-hint">Hover to preview, click to capture</span>
        </div>
        <div id="previewContent" class="preview-content">
          <div class="preview-empty">Start picking and hover over an element to preview its locator</div>
        </div>
      </div>

      <div id="capturedElementsSection" class="captured-elements-section">
        <div id="capturedElementsHeader" class="captured-elements-header">
          <h4>
            <i data-lucide="list-tree" class="section-icon"></i>
            Captured Elements
          </h4>
          <div class="captured-elements-actions">
            <span id="capturedElementsCount" class="captured-count">0 elements</span>
            <button id="copyAllCapturedBtn" class="copy-all-btn" title="Copy All Locators">
              <i data-lucide="copy" class="btn-icon"></i>
            </button>
            <button id="clearCapturedBtn" class="clear-captured-btn" title="Clear All">
              <i data-lucide="trash-2" class="btn-icon"></i>
            </button>
          </div>
        </div>
        <div id="capturedElementsList" class="captured-elements-list">
          <div class="captured-empty-hint">
            <i data-lucide="mouse-pointer" class="empty-hint-icon"></i>
            <span>Click <strong>Start Pick</strong> above to select elements</span>
            <br>
            <small style="color:#999; font-size:11px;">Hold Ctrl to pick a group of elements</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="lucide.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
